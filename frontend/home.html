<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informações do Alvo - Polícia Civil</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="css/style.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Header com logo */
        .header { padding-top: 30px; }
        .header img { width: 90px; }

        /* Nome do alvo */
        .alvo-card {
            margin: 18px 20px 6px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 16px;
            padding: 16px 20px;
            width: calc(100% - 40px);
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .alvo-foto {
            width: 52px; height: 52px;
            border-radius: 50%;
            border: 2px solid #ffd700;
            overflow: hidden;
            flex-shrink: 0;
            background: rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
            color: rgba(255,255,255,0.3); font-size: 22px;
        }

        .alvo-foto img {
            width: 100%; height: 100%;
            object-fit: cover; display: none;
        }

        .alvo-info { flex: 1; min-width: 0; }

        .alvo-label {
            font-size: 10px; color: rgba(255,255,255,0.5);
            text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 3px;
        }

        .alvo-nome {
            font-size: 16px; font-weight: bold;
            color: #ffd700;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* Grade de botões */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 12px 20px;
            width: 100%;
        }

        .menu-btn {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 20px 16px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.2s, transform 0.15s;
            cursor: pointer;
        }

        .menu-btn:active {
            background: rgba(255,255,255,0.14);
            transform: scale(0.96);
        }

        .menu-btn .btn-icon {
            width: 48px; height: 48px;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }

        .menu-btn span {
            color: rgba(255,255,255,0.85);
            font-size: 13px; font-weight: 600;
        }

        /* Cores dos ícones */
        .ic-fotos       { background: rgba(52, 152, 219, 0.25); color: #3498db; }
        .ic-qual        { background: rgba(155, 89, 182, 0.25); color: #9b59b6; }
        .ic-end         { background: rgba(46, 204, 113, 0.25); color: #2ecc71; }
        .ic-mapa        { background: rgba(231, 76, 60, 0.25);  color: #e74c3c; }
        .ic-info        { background: rgba(255, 215, 0, 0.2);   color: #ffd700; }

        /* Botão de informações — largura total */
        .menu-btn.full {
            grid-column: span 2;
            flex-direction: row;
            justify-content: flex-start;
            padding: 18px 20px;
            gap: 16px;
        }

        .menu-btn.full .btn-icon { flex-shrink: 0; }

        .menu-btn.full .btn-texto { text-align: left; }

        .menu-btn.full .btn-texto span {
            display: block; font-size: 15px; color: #ffd700;
        }

        .menu-btn.full .btn-texto small {
            display: block; font-size: 11px;
            color: rgba(255,255,255,0.45); margin-top: 2px;
        }

        .menu-btn.full .btn-arrow {
            margin-left: auto;
            color: rgba(255,255,255,0.2);
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="images/logo.png" alt="Polícia Civil">
    </div>

    <div class="title">
        <h1>RONDÔNIA</h1>
        <h2>POLÍCIA CIVIL</h2>
    </div>

    <!-- Card do alvo -->
    <div class="alvo-card">
        <div class="alvo-foto" id="alvo-foto">
            <i class="fas fa-user" id="foto-icon"></i>
            <img id="foto-perfil" alt="Foto">
        </div>
        <div class="alvo-info">
            <div class="alvo-label">Alvo identificado</div>
            <div class="alvo-nome" id="nome-alvo">Carregando...</div>
        </div>
    </div>

    <!-- Menu -->
    <div class="menu-grid">

        <a id="btn-fotos" href="fotos.html" class="menu-btn">
            <div class="btn-icon ic-fotos"><i class="fas fa-camera"></i></div>
            <span>Fotos</span>
        </a>

        <a id="btn-qualificacao" href="qualificacao.html" class="menu-btn">
            <div class="btn-icon ic-qual"><i class="fas fa-id-card"></i></div>
            <span>Qualificação</span>
        </a>

        <a id="btn-endereco" href="endereco.html" class="menu-btn">
            <div class="btn-icon ic-end"><i class="fas fa-map-signs"></i></div>
            <span>Endereço</span>
        </a>

        <a id="btn-mapa" href="mapa.html" class="menu-btn">
            <div class="btn-icon ic-mapa"><i class="fas fa-map-marker-alt"></i></div>
            <span>Mapa</span>
        </a>

        <a id="btn-informacao" href="informacao.html" class="menu-btn full">
            <div class="btn-icon ic-info"><i class="fas fa-info-circle"></i></div>
            <div class="btn-texto">
                <span>Informações</span>
                <small>Inteligência e documentos</small>
            </div>
            <i class="fas fa-chevron-right btn-arrow"></i>
        </a>

    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const idAlvo = params.get('id');

        const API_URL = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
            ? "http://localhost:3000" : window.location.origin;

        if (idAlvo) {
            const s = `?id=${idAlvo}`;
            ['btn-fotos','btn-qualificacao','btn-endereco','btn-mapa','btn-informacao']
                .forEach(id => document.getElementById(id).href += s);

            fetch(`${API_URL}/buscar-detalhes/${idAlvo}`)
                .then(r => r.json())
                .then(data => {
                    document.getElementById('nome-alvo').textContent = data.nome || 'Não encontrado';

                    // Foto de perfil mini
                    const foto = data.foto1 || data.foto2 || data.foto3;
                    if (foto && foto.length > 50) {
                        const img = document.getElementById('foto-perfil');
                        img.src = `data:image/jpeg;base64,${foto}`;
                        img.style.display = 'block';
                        document.getElementById('foto-icon').style.display = 'none';
                    }
                })
                .catch(() => {
                    document.getElementById('nome-alvo').textContent = 'Erro de conexão';
                });
        } else {
            document.getElementById('nome-alvo').textContent = 'ID não fornecido';
        }
    </script>

    <script src="js/main.js"></script>
</body>
</html>
