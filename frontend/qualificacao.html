<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qualificação do Alvo - Polícia Civil</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet" />
    <style>
        .home-icon {
            position: absolute; top: 25px; left: 20px;
            font-size: 24px; color: rgba(255,255,255,0.7);
            text-decoration: none; z-index: 10;
            transition: color 0.3s;
        }
        .home-icon:hover { color: #ffd700; }

        /* Perfil */
        .perfil-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 20px 20px;
            gap: 12px;
        }

        .foto-circulo {
            width: 110px; height: 110px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid #ffd700;
            box-shadow: 0 0 20px rgba(255,215,0,0.25);
            background: rgba(255,255,255,0.07);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        .foto-circulo img {
            width: 100%; height: 100%; object-fit: cover;
            display: none;
        }

        .foto-circulo i {
            font-size: 42px;
            color: rgba(255,255,255,0.25);
        }

        .nome-destaque {
            color: #ffd700;
            font-size: 17px;
            font-weight: bold;
            text-align: center;
            letter-spacing: 0.3px;
        }

        /* Cards de info */
        .info-lista {
            padding: 0 16px 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .info-card {
            background: rgba(255,255,255,0.95);
            border-radius: 12px;
            padding: 14px 16px;
            color: #1a1a1a;
            box-shadow: 0 2px 8px rgba(0,0,0,0.25);
        }

        .info-card .label {
            font-size: 10px;
            font-weight: bold;
            color: #3a0ca3;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            display: block;
            margin-bottom: 4px;
        }

        .info-card .label i {
            margin-right: 5px;
            color: #3a0ca3;
        }

        .info-card .value {
            font-size: 15px;
            font-weight: 600;
            color: #111;
            word-break: break-word;
        }

        /* Row de 2 cards lado a lado */
        .info-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        /* Row de 3 cards */
        .info-row-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }

        .btn-voltar {
            margin: 5px auto 40px;
            display: inline-flex; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.1); color: white;
            padding: 12px 28px; border-radius: 30px;
            text-decoration: none; font-weight: bold;
            transition: background 0.2s;
        }

        .btn-voltar:active { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <a href="home.html" id="home-link" class="home-icon">
        <i class="fas fa-home"></i>
    </a>

    <div class="header">
        <img src="images/logo.png" alt="Polícia Civil">
    </div>

    <div class="info-container">
        <div class="subtitle">Qualificação do Alvo</div>
    </div>

    <!-- Foto + Nome -->
    <div class="perfil-box">
        <div class="foto-circulo" id="foto-circulo">
            <i class="fas fa-user" id="foto-icon"></i>
            <img id="img-principal" alt="Foto do Alvo">
        </div>
    </div>

    <!-- Dados -->
    <div class="info-lista">

        <div class="info-card">
            <span class="label"><i class="fas fa-id-badge"></i> Nome Completo</span>
            <span class="value" id="nome">...</span>
        </div>

        <div class="info-card">
            <span class="label"><i class="fas fa-female"></i> Nome da Mãe</span>
            <span class="value" id="nome-mae">...</span>
        </div>

        <div class="info-card">
            <span class="label"><i class="fas fa-male"></i> Nome do Pai</span>
            <span class="value" id="nome-pai">...</span>
        </div>

        <div class="info-row">
            <div class="info-card">
                <span class="label"><i class="fas fa-calendar"></i> Nascimento</span>
                <span class="value" id="data-nascimento">...</span>
            </div>
            <div class="info-card">
                <span class="label"><i class="fas fa-map-marker-alt"></i> Naturalidade</span>
                <span class="value" id="natural">...</span>
            </div>
        </div>

        <div class="info-row">
            <div class="info-card">
                <span class="label"><i class="fas fa-flag"></i> UF</span>
                <span class="value" id="uf">...</span>
            </div>
            <div class="info-card">
                <span class="label"><i class="fas fa-id-card"></i> RG</span>
                <span class="value" id="rg">...</span>
            </div>
        </div>

        <div class="info-card">
            <span class="label"><i class="fas fa-fingerprint"></i> CPF</span>
            <span class="value" id="cpf">...</span>
        </div>

    </div>

    <div style="text-align:center;">
        <a href="home.html" id="link-voltar" class="btn-voltar">
            <i class="fas fa-arrow-left"></i> Voltar ao Início
        </a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const idAlvo = params.get('id');

        const API_URL = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
            ? "http://localhost:3000" : window.location.origin;

        if (idAlvo) {
            document.getElementById('link-voltar').href = `home.html?id=${idAlvo}`;
            document.getElementById('home-link').href   = `home.html?id=${idAlvo}`;

            fetch(`${API_URL}/buscar-detalhes/${idAlvo}`)
                .then(r => r.json())
                .then(data => {
                    document.getElementById('header-nome').textContent  = data.nome         || 'N/A';
                    document.getElementById('nome').textContent         = data.nome         || 'Não informado';
                    document.getElementById('nome-mae').textContent     = data.mae          || 'Não informado';
                    document.getElementById('nome-pai').textContent     = data.pai          || 'Não informado';
                    document.getElementById('cpf').textContent          = data.cpf          || 'Não informado';
                    document.getElementById('rg').textContent           = data.rg           || 'Não informado';
                    document.getElementById('natural').textContent      = data.naturalidade || 'Não informado';
                    document.getElementById('uf').textContent           = data.uf_natural   || '--';

                    if (data.data_nascimento) {
                        document.getElementById('data-nascimento').textContent =
                            new Date(data.data_nascimento).toLocaleDateString('pt-BR', { timeZone: 'UTC' });
                    }

                    // Foto principal
                    const fotoB64 = data.foto1 || data.foto2 || data.foto3;
                    if (fotoB64 && fotoB64.length > 50) {
                        const img = document.getElementById('img-principal');
                        img.src = `data:image/jpeg;base64,${fotoB64}`;
                        img.style.display = 'block';
                        document.getElementById('foto-icon').style.display = 'none';
                    }
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('header-nome').textContent = "Erro ao carregar";
                });
        }
    </script>
</body>
</html>
