<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qualificação do Alvo - Polícia Civil</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet" />
    <style>
        .home-icon {
            position: absolute; top: 25px; left: 20px;
            font-size: 24px; color: rgba(255,255,255,0.7);
            text-decoration: none; z-index: 10;
        }

        /* Foto principal do alvo */
        .foto-principal {
            width: 120px; height: 120px;
            border-radius: 50%;
            overflow: hidden;
            margin: 15px auto;
            border: 3px solid #ffd700;
            display: none;
            box-shadow: 0 4px 15px rgba(255,215,0,0.3);
        }

        .foto-principal img {
            width: 100%; height: 100%;
            object-fit: cover;
        }

        .foto-placeholder {
            width: 120px; height: 120px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            margin: 15px auto;
            display: flex; align-items: center; justify-content: center;
            border: 2px dashed rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.3);
            font-size: 40px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px; padding: 20px; text-align: left;
        }

        .info-grid div {
            background-color: rgba(255,255,255,0.95);
            color: #1a1a1a; padding: 12px; border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .label {
            font-weight: bold; display: block;
            font-size: 12px; color: #333;
            text-transform: uppercase; margin-bottom: 4px;
        }

        .value { font-size: 15px; word-break: break-word; }

        .full-width, .col-span-3 { grid-column: span 3; }
        .col-span-2 { grid-column: span 2; }

        .btn-voltar {
            margin: 20px auto 40px;
            display: inline-flex; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.1); color: white;
            padding: 12px 25px; border-radius: 30px;
            text-decoration: none; font-weight: bold;
        }
    </style>
</head>
<body>

    <a href="index.html" id="home-link" class="home-icon">
        <i class="fas fa-home"></i>
    </a>

    <div class="header">
        <img src="images/logo.png" alt="Polícia Civil">
    </div>

    <div class="info-container">
        <div class="subtitle">Qualificação do Alvo</div>
    </div>

    <!-- Foto principal do alvo (primeira disponível) -->
    <div id="foto-principal-container" style="text-align:center;">
        <div class="foto-placeholder" id="foto-placeholder">
            <i class="fas fa-user"></i>
        </div>
        <div class="foto-principal" id="foto-principal">
            <img id="img-principal" alt="Foto do Alvo">
        </div>
        <p style="color:#ffd700; font-weight:bold; margin:5px 0 0; font-size:16px;" id="header-nome">Carregando...</p>
    </div>

    <div class="info-grid">
        <div class="col-span-3">
            <span class="label">Nome Completo:</span>
            <span id="nome" class="value">...</span>
        </div>
        <div class="col-span-3">
            <span class="label">Mãe:</span>
            <span id="nome-mae" class="value">...</span>
        </div>
        <div class="col-span-3">
            <span class="label">Pai:</span>
            <span id="nome-pai" class="value">...</span>
        </div>
        <div>
            <span class="label">D.T. Nasc.:</span>
            <span id="data-nascimento" class="value">...</span>
        </div>
        <div>
            <span class="label">Natural:</span>
            <span id="natural" class="value">...</span>
        </div>
        <div>
            <span class="label">UF:</span>
            <span id="uf" class="value">...</span>
        </div>
        <div class="col-span-2">
            <span class="label">CPF:</span>
            <span id="cpf" class="value">...</span>
        </div>
        <div>
            <span class="label">RG:</span>
            <span id="rg" class="value">...</span>
        </div>
    </div>

    <div style="text-align:center;">
        <a href="index.html" id="link-voltar" class="btn-voltar">
            <i class="fas fa-arrow-left"></i> Voltar ao Início
        </a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const idAlvo = params.get('id');

        const API_URL = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
            ? "http://localhost:3000" : window.location.origin;

        if (idAlvo) {
            document.getElementById('link-voltar').href = `index.html?id=${idAlvo}`;
            document.getElementById('home-link').href = `index.html?id=${idAlvo}`;

            fetch(`${API_URL}/buscar-detalhes/${idAlvo}`)
                .then(r => r.json())
                .then(data => {
                    document.getElementById('header-nome').textContent = data.nome || 'N/A';
                    document.getElementById('nome').textContent          = data.nome         || 'Não informado';
                    document.getElementById('nome-mae').textContent      = data.mae          || 'Não informado';
                    document.getElementById('nome-pai').textContent      = data.pai          || 'Não informado';
                    document.getElementById('cpf').textContent           = data.cpf          || 'Não informado';
                    document.getElementById('rg').textContent            = data.rg           || 'Não informado';
                    document.getElementById('natural').textContent       = data.naturalidade || 'Não informado';
                    document.getElementById('uf').textContent            = data.uf_natural   || '--';

                    if (data.data_nascimento) {
                        document.getElementById('data-nascimento').textContent =
                            new Date(data.data_nascimento).toLocaleDateString('pt-BR', {timeZone:'UTC'});
                    }

                    // Foto principal — usa a primeira foto disponível
                    const fotoB64 = data.foto1 || data.foto2 || data.foto3;
                    if (fotoB64 && fotoB64.length > 50) {
                        document.getElementById('img-principal').src = `data:image/jpeg;base64,${fotoB64}`;
                        document.getElementById('foto-principal').style.display = 'block';
                        document.getElementById('foto-placeholder').style.display = 'none';
                    }
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('header-nome').textContent = "Erro ao carregar";
                });
        }
    </script>
</body>
</html>
