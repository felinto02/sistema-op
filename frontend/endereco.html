<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endereço do Alvo - Polícia Civil</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet" />
    <style>
        .home-icon {
            position: absolute; top: 25px; left: 20px;
            font-size: 24px; color: rgba(255,255,255,0.7);
            text-decoration: none; z-index: 10;
        }

        /* Fotos do local */
        .fotos-local {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 20px;
        }

        .foto-local-card {
            border-radius: 10px;
            overflow: hidden;
            aspect-ratio: 4/3;
            cursor: pointer;
            display: none;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .foto-local-card img {
            width: 100%; height: 100%;
            object-fit: cover; display: block;
        }

        /* Modal foto */
        .modal-foto {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.97); z-index: 9999;
            justify-content: center; align-items: center;
        }

        .modal-foto img { max-width: 100%; max-height: 92vh; object-fit: contain; }

        .modal-foto-close {
            position: absolute; top: 15px; right: 15px;
            background: rgba(255,255,255,0.15); border: none; color: white;
            font-size: 20px; width: 44px; height: 44px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            padding: 20px;
            text-align: left;
        }

        .info-grid div {
            background-color: rgba(255,255,255,0.95);
            color: #1a1a1a; padding: 12px; border-radius: 8px;
        }

        .label {
            font-weight: bold; display: block;
            font-size: 11px; color: #555;
            text-transform: uppercase; margin-bottom: 3px;
        }

        .value { font-size: 14px; font-weight: 500; }

        .obs-tactica {
            grid-column: span 3;
            background-color: #fff3cd !important;
            border-left: 5px solid #ffc107;
        }

        .full-width { grid-column: span 3; }
        .col-span-2 { grid-column: span 2; }

        .section-label {
            color: #ffd700; font-size: 13px; font-weight: bold;
            text-transform: uppercase; letter-spacing: 1px;
            margin: 15px 20px 8px;
            display: flex; align-items: center; gap: 8px;
            border-bottom: 1px solid rgba(255,215,0,0.3);
            padding-bottom: 8px;
        }

        .btn-voltar {
            margin: 20px auto 40px;
            display: inline-flex; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.1); color: white;
            padding: 12px 25px; border-radius: 30px;
            text-decoration: none; font-weight: bold;
        }

        .sem-fotos {
            grid-column: span 2; text-align: center;
            padding: 20px; color: rgba(255,255,255,0.4);
            font-style: italic; font-size: 13px;
        }
    </style>
</head>
<body>

    <a href="home.html" id="home-link" class="home-icon">
        <i class="fas fa-home"></i>
    </a>

    <div class="header">
        <img src="images/logo.png" alt="Polícia Civil">
    </div>

    <div class="info-container">
        <div class="subtitle">Localização e Inteligência</div>
        <p class="nome-alvo">Alvo: <strong id="header-nome">Carregando...</strong></p>
    </div>

    <!-- Fotos do Local -->
    <div class="section-label">
        <i class="fas fa-home"></i> Fotos do Local / Residência
    </div>
    <div class="fotos-local">
        <div class="foto-local-card" id="card-local1">
            <img id="img-local1" alt="Local 1">
        </div>
        <div class="foto-local-card" id="card-local2">
            <img id="img-local2" alt="Local 2">
        </div>
        <div class="sem-fotos" id="sem-fotos-local" style="display:none;">
            <i class="fas fa-home" style="font-size:24px; display:block; margin-bottom:8px; opacity:0.4;"></i>
            Nenhuma foto do local cadastrada
        </div>
    </div>

    <!-- Dados do Endereço -->
    <div class="section-label">
        <i class="fas fa-map-marker-alt"></i> Dados do Endereço
    </div>
    <div class="info-grid">
        <div class="full-width">
            <span class="label">Rua/Logradouro:</span>
            <span id="rua" class="value">...</span>
        </div>
        <div>
            <span class="label">Nº:</span>
            <span id="numero" class="value">...</span>
        </div>
        <div class="col-span-2">
            <span class="label">Bairro:</span>
            <span id="bairro" class="value">...</span>
        </div>
        <div class="col-span-2">
            <span class="label">Cidade:</span>
            <span id="cidade" class="value">...</span>
        </div>
        <div>
            <span class="label">UF:</span>
            <span id="uf" class="value">...</span>
        </div>
        <div class="full-width">
            <span class="label">Ponto de Referência:</span>
            <span id="referencia" class="value">...</span>
        </div>
        <div class="obs-tactica">
            <span class="label" style="color:#856404;">
                <i class="fas fa-exclamation-triangle"></i> Observações Táticas:
            </span>
            <span id="obs-tactica" class="value">...</span>
        </div>
    </div>

    <!-- Modal foto -->
    <div class="modal-foto" id="modal-foto" onclick="fecharFoto()">
        <button class="modal-foto-close"><i class="fas fa-times"></i></button>
        <img id="modal-foto-img" src="" alt="Foto">
    </div>

    <div style="text-align:center;">
        <a href="home.html" id="link-voltar" class="btn-voltar">
            <i class="fas fa-arrow-left"></i> Voltar ao Início
        </a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const idAlvo = params.get('id');

        const API_URL = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
            ? "http://localhost:3000" : window.location.origin;

        if (idAlvo) {
            document.getElementById('link-voltar').href = `home.html?id=${idAlvo}`;
            document.getElementById('home-link').href = `home.html?id=${idAlvo}`;

            fetch(`${API_URL}/buscar-detalhes/${idAlvo}`)
                .then(r => r.json())
                .then(data => {
                    document.getElementById('header-nome').textContent = data.nome;

                    // Endereço — campos corrigidos com os nomes certos da API
                    document.getElementById('rua').textContent       = data.rua        || 'Não informado';
                    document.getElementById('numero').textContent    = data.numero     || 'S/N';
                    document.getElementById('bairro').textContent    = data.bairro     || 'Não informado';
                    document.getElementById('cidade').textContent    = data.cidade     || 'Não informado';
                    document.getElementById('uf').textContent        = data.uf_endereco || '--';
                    document.getElementById('referencia').textContent = data.complemento  || 'Nenhum ponto de referência';
                    document.getElementById('obs-tactica').textContent = data.obs_tacticas || 'Nenhuma observação relevante.';

                    // Fotos do local
                    let temFoto = false;
                    [['img-local1','card-local1', data.foto_local1],
                     ['img-local2','card-local2', data.foto_local2]].forEach(([img, card, b64]) => {
                        if (b64 && b64.length > 50) {
                            const el = document.getElementById(img);
                            el.src = `data:image/jpeg;base64,${b64}`;
                            const cardEl = document.getElementById(card);
                            cardEl.style.display = 'block';
                            cardEl.onclick = () => abrirFoto(`data:image/jpeg;base64,${b64}`);
                            temFoto = true;
                        }
                    });
                    if (!temFoto) document.getElementById('sem-fotos-local').style.display = 'block';
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('header-nome').textContent = "Erro ao carregar";
                });
        }

        function abrirFoto(src) {
            document.getElementById('modal-foto-img').src = src;
            document.getElementById('modal-foto').style.display = 'flex';
        }

        function fecharFoto() {
            document.getElementById('modal-foto').style.display = 'none';
            document.getElementById('modal-foto-img').src = '';
        }

        document.addEventListener('keydown', e => { if (e.key === 'Escape') fecharFoto(); });
    </script>
</body>
</html>
