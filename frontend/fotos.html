<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotos do Alvo - Polícia Civil</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet" />
    <style>
        .home-icon {
            position: absolute; top: 25px; left: 20px;
            font-size: 24px; color: rgba(255,255,255,0.7);
            text-decoration: none; transition: color 0.3s; z-index: 10;
        }
        .home-icon:hover { color: #ffd700; }

        .section-label {
            color: #ffd700;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 20px 20px 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid rgba(255,215,0,0.3);
            padding-bottom: 8px;
        }

        /* Grid de fotos do alvo - 3 colunas */
        .fotos-grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 0 20px;
        }

        /* Grid de fotos do local - 2 colunas */
        .fotos-grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            padding: 0 20px;
        }

        .foto-card {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            background: rgba(255,255,255,0.05);
            aspect-ratio: 3/4;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
            display: none;
        }

        .foto-card-local {
            aspect-ratio: 4/3;
        }

        .foto-card img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.2s;
        }

        .foto-card:active img { transform: scale(0.97); }

        .foto-card .foto-num {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.75));
            color: white; font-size: 11px; font-weight: bold;
            padding: 12px 8px 6px; text-align: center;
        }

        .sem-fotos {
            text-align: center;
            padding: 30px;
            color: rgba(255,255,255,0.4);
            font-style: italic;
            font-size: 14px;
        }

        .sem-fotos i { font-size: 36px; display: block; margin-bottom: 10px; }

        /* Modal foto tela cheia */
        .modal-foto {
            display: none;
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.97);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .modal-foto img {
            max-width: 100%; max-height: 92vh;
            object-fit: contain;
        }

        .modal-foto-close {
            position: absolute; top: 15px; right: 15px;
            background: rgba(255,255,255,0.15);
            border: none; color: white;
            font-size: 20px; width: 44px; height: 44px;
            border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        .btn-voltar {
            margin: 25px auto 40px;
            display: inline-flex; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.1); color: white;
            padding: 12px 25px; border-radius: 30px;
            text-decoration: none; font-weight: bold;
        }
    </style>
</head>
<body>

    <a href="home.html" id="home-link" class="home-icon">
        <i class="fas fa-home"></i>
    </a>

    <div class="header">
        <img src="images/logo.png" alt="Polícia Civil">
    </div>

    <div class="info-container">
        <div class="subtitle">Galeria de Fotos</div>
        <p class="nome-alvo">Alvo: <strong id="nome-alvo">Carregando...</strong></p>
    </div>

    <!-- Fotos do Alvo -->
    <div class="section-label">
        <i class="fas fa-user"></i> Fotos do Alvo
    </div>
    <div class="fotos-grid-3" id="grid-alvo">
        <div class="foto-card" id="card-foto1">
            <img id="img-foto1" alt="Foto 1">
            <div class="foto-num">Foto 1</div>
        </div>
        <div class="foto-card" id="card-foto2">
            <img id="img-foto2" alt="Foto 2">
            <div class="foto-num">Foto 2</div>
        </div>
        <div class="foto-card" id="card-foto3">
            <img id="img-foto3" alt="Foto 3">
            <div class="foto-num">Foto 3</div>
        </div>
        <div class="sem-fotos" id="sem-fotos-alvo" style="grid-column:span 3; display:none;">
            <i class="fas fa-camera-slash"></i> Nenhuma foto cadastrada
        </div>
    </div>

    <!-- Fotos do Local -->
    <div class="section-label" style="margin-top: 25px;">
        <i class="fas fa-home"></i> Fotos do Local / Residência
    </div>
    <div class="fotos-grid-2" id="grid-local">
        <div class="foto-card foto-card-local" id="card-local1">
            <img id="img-local1" alt="Local 1">
            <div class="foto-num">Local 1</div>
        </div>
        <div class="foto-card foto-card-local" id="card-local2">
            <img id="img-local2" alt="Local 2">
            <div class="foto-num">Local 2</div>
        </div>
        <div class="sem-fotos" id="sem-fotos-local" style="grid-column:span 2; display:none;">
            <i class="fas fa-home"></i> Nenhuma foto do local cadastrada
        </div>
    </div>

    <!-- Modal tela cheia -->
    <div class="modal-foto" id="modal-foto" onclick="fecharFoto()">
        <button class="modal-foto-close"><i class="fas fa-times"></i></button>
        <img id="modal-foto-img" src="" alt="Foto">
    </div>

    <div style="text-align:center;">
        <a href="home.html" id="link-voltar" class="btn-voltar">
            <i class="fas fa-arrow-left"></i> Voltar ao Início
        </a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const idAlvo = params.get('id');

        const API_URL = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
            ? "http://localhost:3000" : window.location.origin;

        if (idAlvo) {
            document.getElementById('link-voltar').href = `home.html?id=${idAlvo}`;
            document.getElementById('home-link').href = `home.html?id=${idAlvo}`;

            fetch(`${API_URL}/buscar-detalhes/${idAlvo}`)
                .then(r => r.json())
                .then(data => {
                    document.getElementById('nome-alvo').textContent = data.nome;

                    // Fotos do alvo
                    let temFotoAlvo = false;
                    [['img-foto1','card-foto1',data.foto1],
                     ['img-foto2','card-foto2',data.foto2],
                     ['img-foto3','card-foto3',data.foto3]].forEach(([img, card, b64]) => {
                        if (b64 && b64.length > 50) {
                            const el = document.getElementById(img);
                            el.src = `data:image/jpeg;base64,${b64}`;
                            const cardEl = document.getElementById(card);
                            cardEl.style.display = 'block';
                            cardEl.onclick = () => abrirFoto(`data:image/jpeg;base64,${b64}`);
                            temFotoAlvo = true;
                        }
                    });
                    if (!temFotoAlvo) document.getElementById('sem-fotos-alvo').style.display = 'block';

                    // Fotos do local
                    let temFotoLocal = false;
                    [['img-local1','card-local1',data.foto_local1],
                     ['img-local2','card-local2',data.foto_local2]].forEach(([img, card, b64]) => {
                        if (b64 && b64.length > 50) {
                            const el = document.getElementById(img);
                            el.src = `data:image/jpeg;base64,${b64}`;
                            const cardEl = document.getElementById(card);
                            cardEl.style.display = 'block';
                            cardEl.onclick = () => abrirFoto(`data:image/jpeg;base64,${b64}`);
                            temFotoLocal = true;
                        }
                    });
                    if (!temFotoLocal) document.getElementById('sem-fotos-local').style.display = 'block';
                })
                .catch(() => {
                    document.getElementById('nome-alvo').textContent = "Erro de conexão";
                });
        }

        function abrirFoto(src) {
            document.getElementById('modal-foto-img').src = src;
            document.getElementById('modal-foto').style.display = 'flex';
        }

        function fecharFoto() {
            document.getElementById('modal-foto').style.display = 'none';
            document.getElementById('modal-foto-img').src = '';
        }

        document.addEventListener('keydown', e => { if (e.key === 'Escape') fecharFoto(); });
    </script>
</body>
</html>
