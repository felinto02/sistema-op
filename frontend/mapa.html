<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Operacional - Polícia Civil</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet" />
    <style>
        .home-icon {
            position: absolute; top: 25px; left: 20px;
            font-size: 24px; color: rgba(255,255,255,0.7);
            text-decoration: none; z-index: 10; transition: color 0.3s;
        }
        .home-icon:hover { color: #ffd700; }

        /* Mapa */
        #map-container {
            margin: 16px;
            height: 340px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 6px 20px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.08);
            background: #1a1a2e;
        }

        iframe { width: 100%; height: 100%; border: none; display: block; }

        /* Card de endereço */
        .endereco-card {
            margin: 0 16px;
            background: rgba(255,255,255,0.07);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255,215,0,0.15);
        }

        .endereco-card i {
            color: #ffd700; font-size: 18px; flex-shrink: 0;
        }

        .endereco-card span {
            color: rgba(255,255,255,0.85);
            font-size: 13px; line-height: 1.5;
        }

        /* Botões de ação */
        .acoes {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 16px;
        }

        .btn-navegar {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white; padding: 18px; border-radius: 14px;
            text-decoration: none; font-weight: bold; font-size: 16px;
            box-shadow: 0 4px 15px rgba(46,204,113,0.35);
            transition: opacity 0.2s;
        }

        .btn-navegar:active { opacity: 0.85; }

        .btn-link-maps {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.8);
            padding: 14px; border-radius: 14px;
            text-decoration: none; font-size: 14px; font-weight: bold;
            border: 1px solid rgba(255,255,255,0.12);
            transition: background 0.2s;
        }

        .btn-link-maps:active { background: rgba(255,255,255,0.15); }

        .btn-voltar {
            margin: 4px auto 40px;
            display: inline-flex; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.1); color: white;
            padding: 12px 28px; border-radius: 30px;
            text-decoration: none; font-weight: bold; transition: background 0.2s;
        }

        .btn-voltar:active { background: rgba(255,255,255,0.2); }

        /* Loading state do mapa */
        .map-loading {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100%; color: rgba(255,255,255,0.3); gap: 12px;
        }

        .map-loading i { font-size: 36px; }
        .map-loading p { font-size: 13px; }
    </style>
</head>
<body>

    <a href="home.html" id="home-link" class="home-icon">
        <i class="fas fa-home"></i>
    </a>

    <div class="header">
        <img src="images/logo.png" alt="Polícia Civil">
    </div>

    <div class="info-container">
        <div class="subtitle"><i class="fas fa-map-marked-alt"></i> Mapa Operacional</div>
        <p class="nome-alvo">Alvo: <strong id="nome-exibicao">Carregando...</strong></p>
    </div>

    <!-- Mapa embed -->
    <div id="map-container">
        <div class="map-loading" id="map-loading">
            <i class="fas fa-map-marker-alt"></i>
            <p>Carregando mapa...</p>
        </div>
        <iframe id="mapa-frame" src="" allowfullscreen loading="lazy" style="display:none;"
            onload="document.getElementById('map-loading').style.display='none'; this.style.display='block';"></iframe>
    </div>

    <!-- Endereço -->
    <div class="endereco-card" id="endereco-card" style="display:none;">
        <i class="fas fa-map-marker-alt"></i>
        <span id="txt-endereco">Buscando endereço...</span>
    </div>

    <!-- Ações -->
    <div class="acoes">
        <a href="#" id="link-gps" class="btn-navegar" target="_blank">
            <i class="fas fa-location-arrow"></i> INICIAR NAVEGAÇÃO GPS
        </a>
        <a href="#" id="link-maps" class="btn-link-maps" target="_blank">
            <i class="fab fa-google"></i> Abrir no Google Maps
        </a>
    </div>

    <div style="text-align:center;">
        <a href="home.html" id="link-voltar" class="btn-voltar">
            <i class="fas fa-arrow-left"></i> Voltar ao Início
        </a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const idAlvo = params.get('id');

        const API_URL = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
            ? "http://localhost:3000" : window.location.origin;

        if (idAlvo) {
            document.getElementById('home-link').href  = `home.html?id=${idAlvo}`;
            document.getElementById('link-voltar').href = `home.html?id=${idAlvo}`;

            fetch(`${API_URL}/buscar-detalhes/${idAlvo}`)
                .then(r => r.json())
                .then(data => {
                    const endereco = [data.rua, data.numero, data.bairro, data.cidade, data.uf_endereco]
                        .filter(Boolean).join(', ');

                    document.getElementById('nome-exibicao').textContent = data.nome;
                    document.getElementById('txt-endereco').textContent  = endereco;
                    document.getElementById('endereco-card').style.display = 'flex';

                    // Usa link_mapa se cadastrado, senão monta pelo endereço
                    const destino = data.link_mapa && data.link_mapa.includes('maps')
                        ? encodeURIComponent(data.link_mapa)
                        : encodeURIComponent(endereco);

                    // Embed do mapa
                    const embedUrl = `https://www.google.com/maps?q=${destino}&output=embed`;
                    document.getElementById('mapa-frame').src = embedUrl;

                    // GPS — abre navegação direta
                    const gpsUrl = `https://www.google.com/maps/dir/?api=1&destination=${destino}&travelmode=driving`;
                    document.getElementById('link-gps').href = gpsUrl;

                    // Link direto Google Maps
                    const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${destino}`;
                    document.getElementById('link-maps').href = mapsUrl;
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('nome-exibicao').textContent = "Erro ao carregar";
                });
        }
    </script>
</body>
</html>
